<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyber — Neon Futurism</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="grid-bg"></div>
  
  <nav class="nav">
    <div class="container">
      <div class="logo">CYBER</div>
      <div class="nav-links">
        <a href="#">Systems</a>
        <a href="#">Network</a>
        <a href="#">Access</a>
      </div>
    </div>
  </nav>

  <main>
    <section class="hero">
      <div class="container">
        <h1><span class="neon">Enter</span> the Future</h1>
        <p>Next-generation interfaces for the digital age. Connect to the matrix.</p>
        <button class="btn btn-primary">Initialize</button>
      </div>
    </section>

    <section class="systems">
      <div class="container">
        <div class="system-card">
          <div class="system-icon">◈</div>
          <h3>Neural Network</h3>
          <p>AI-powered analytics</p>
        </div>
        <div class="system-card">
          <div class="system-icon">⟡</div>
          <h3>Quantum Core</h3>
          <p>Next-gen processing</p>
        </div>
        <div class="system-card">
          <div class="system-icon">◉</div>
          <h3>Cyber Security</h3>
          <p>Fortress-level protection</p>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
