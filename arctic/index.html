<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arctic — Cool & Crisp</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <nav class="nav">
    <div class="container">
      <div class="logo">❄️ Arctic</div>
      <div class="nav-links">
        <a href="#">Products</a>
        <a href="#">Solutions</a>
        <a href="#">Pricing</a>
      </div>
    </div>
  </nav>

  <main>
    <section class="hero">
      <div class="container">
        <h1>Crystal Clear Design</h1>
        <p>A refreshing approach to modern web design. Clean, crisp, and effortlessly beautiful.</p>
        <div class="hero-btns">
          <button class="btn btn-primary">Get Started</button>
          <button class="btn btn-ghost">Learn More</button>
        </div>
      </div>
    </section>

    <section class="features">
      <div class="container">
        <div class="feature-grid">
          <div class="feature">
            <div class="feature-icon">🧊</div>
            <h3>Clean</h3>
            <p>Minimal design, maximum impact</p>
          </div>
          <div class="feature">
            <div class="feature-icon">💎</div>
            <h3>Precise</h3>
            <p>Pixel-perfect in every detail</p>
          </div>
          <div class="feature">
            <div class="feature-icon">🌨️</div>
            <h3>Light</h3>
            <p>Fast as fresh mountain air</p>
          </div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
