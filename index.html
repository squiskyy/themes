<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Themes Collection</title>
  <style>
    :root {
      --bg-dark: #0a0e1a;
      --bg-card: #1a2542;
      --text-primary: #f0f4ff;
      --text-secondary: rgba(240, 244, 255, 0.7);
      --accent: #ffd700;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg-dark);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 60px 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 60px;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 15px;
      background: linear-gradient(135deg, var(--text-primary), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: var(--text-secondary);
      font-size: 1.2rem;
    }

    .themes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 30px;
    }

    .theme-card {
      background: var(--bg-card);
      border-radius: 15px;
      overflow: hidden;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      border: 1px solid rgba(255, 215, 0, 0.1);
    }

    .theme-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 40px rgba(255, 215, 0, 0.2);
    }

    .theme-preview {
      height: 200px;
      background: linear-gradient(180deg, #0a0e1a 0%, #1a2542 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .theme-preview::before {
      content: '';
      position: absolute;
      width: 100px;
      height: 100px;
      background: radial-gradient(circle, rgba(255, 215, 0, 0.3), transparent);
      filter: blur(20px);
    }

    .theme-name {
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--accent);
      z-index: 1;
    }

    .theme-info {
      padding: 25px;
    }

    .theme-info h3 {
      font-size: 1.3rem;
      margin-bottom: 10px;
    }

    .theme-info p {
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .btn {
      display: inline-block;
      padding: 12px 30px;
      background: linear-gradient(135deg, var(--accent), #ffec8b);
      color: var(--bg-dark);
      text-decoration: none;
      border-radius: 50px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.3s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(255, 215, 0, 0.4);
    }

    footer {
      text-align: center;
      margin-top: 60px;
      padding-top: 30px;
      border-top: 1px solid rgba(255, 215, 0, 0.1);
      color: var(--text-secondary);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Themes Collection</h1>
      <p class="subtitle">Static web themes ready to drop into your project</p>
    </header>

    <div class="themes-grid">
      <div class="theme-card">
        <div class="theme-preview">
          <span class="theme-name">Midnight</span>
        </div>
        <div class="theme-info">
          <h3>Midnight</h3>
          <p>Celestial night theme with deep blues, golden accents, and animated starfield effects.</p>
          <a href="midnight/" class="btn">View Theme</a>
        </div>
      </div>
    </div>

    <footer>
      <p>More themes coming soon...</p>
    </footer>
  </div>
</body>
</html>
