<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sakura — Cherry Blossom</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="petals"></div>
  
  <nav class="nav">
    <div class="container">
      <div class="logo">🌸 Sakura</div>
      <div class="nav-links">
        <a href="#">Collection</a>
        <a href="#">Story</a>
        <a href="#">Visit</a>
      </div>
    </div>
  </nav>

  <main>
    <section class="hero">
      <div class="container">
        <h1>Bloom Where You Are</h1>
        <p>Embrace the beauty of fleeting moments. Our collection celebrates the ephemeral nature of cherry blossoms.</p>
        <button class="btn">Explore Collection</button>
      </div>
    </section>

    <section class="collection">
      <div class="container">
        <div class="collection-grid">
          <div class="collection-item">
            <div class="item-img"></div>
            <h3>Spring Breeze</h3>
            <p>Light as air</p>
          </div>
          <div class="collection-item">
            <div class="item-img"></div>
            <h3>Petal Soft</h3>
            <p>Gentle touch</p>
          </div>
          <div class="collection-item">
            <div class="item-img"></div>
            <h3>Bloom</h3>
            <p>Full flourish</p>
          </div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
